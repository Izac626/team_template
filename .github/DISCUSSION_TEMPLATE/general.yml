title: "[Discussion] "
labels: [discussion]
body:
  - type: markdown
    attributes:
      value: |
        💬 자유롭게 의견을 나눠주세요!

  - type: input
    id: topic
    attributes:
      label: 주제
      description: 어떤 주제로 이야기하고 싶으신가요?
      placeholder: 예) API 설계 방향에 대해 이야기하고 싶어요
    validations:
      required: true

  - type: textarea
    id: content
    attributes:
      label: 내용
      description: 구체적인 내용을 작성해주세요
      placeholder: 내용을 입력해주세요
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: 참고 자료 (선택)
      description: 관련 링크나 자료가 있으면 첨부해주세요
      placeholder: 링크 또는 내용
    validations:
      required: false
